<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><title>FTMS — Invoices</title><link rel="stylesheet" href="/css/style.css"/></head>
<body>
<div class="app-layout">
<aside class="sidebar">
<div class="sidebar-brand"><div class="brand-icon">🌐</div><h1>FTMS</h1><p>Foreign Trade System</p></div>
<nav class="sidebar-nav">
<a href="/dashboard">📊 <span class="nav-label">Dashboard</span></a>
<a href="/customers">👥 <span class="nav-label">Customers</span></a>
<a href="/orders">📦 <span class="nav-label">Orders</span></a>
<a href="/forex">💱 <span class="nav-label">Forex</span></a>
<a href="/invoices" class="active">🧾 <span class="nav-label">Invoices</span></a>
<a href="/products">🏭 <span class="nav-label">Products</span></a>
<a href="/countries">🌍 <span class="nav-label">Countries</span></a>
<a href="/banks">🏦 <span class="nav-label">Banks</span></a>
<a href="/currencies">💰 <span class="nav-label">Currencies</span></a>
<a href="/exchange-rates">📈 <span class="nav-label">Rates</span></a>
</nav>
<div class="sidebar-footer"><div>© 2025 FTMS v1.0</div><button class="btn btn-danger btn-sm" style="margin-top:8px;width:100%;justify-content:center;" onclick="handleLogout()">Logout</button></div>
</aside>
<main class="main-content">
<div class="page-header"><div><h2>Invoices</h2><p id="subTitle">Loading...</p></div>
<div style="display:flex;gap:8px;"><button class="btn btn-primary btn-sm" onclick="filterInvoices('ALL')">ALL</button><button class="btn btn-secondary btn-sm" onclick="filterInvoices('PENDING')">PENDING</button><button class="btn btn-secondary btn-sm" onclick="filterInvoices('COMPLETED')">COMPLETED</button><button class="btn btn-secondary btn-sm" onclick="filterInvoices('FAILED')">FAILED</button></div>
</div>
<div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
<div class="stat-card blue"><div class="stat-label">Total</div><div class="stat-value" id="totalCount">—</div></div>
<div class="stat-card gold"><div class="stat-label">Pending</div><div class="stat-value" id="pendingCount">—</div></div>
<div class="stat-card green"><div class="stat-label">Completed</div><div class="stat-value" id="completedCount">—</div></div>
</div>
<div class="card"><div class="table-wrap"><table><thead><tr><th>ID</th><th>Customer</th><th>Type</th><th>Ref ID</th><th>Amount</th><th>Currency</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody id="invoicesTable"><tr><td colspan="9"><div class="loading"><div class="spinner"></div></div></td></tr></tbody></table></div></div>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/invoices.js"></script>
</body>
</html>
