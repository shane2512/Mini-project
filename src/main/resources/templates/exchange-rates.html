<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><title>FTMS — Exchange Rates</title><link rel="stylesheet" href="/css/style.css"/></head>
<body>
<div class="app-layout">
<aside class="sidebar">
<div class="sidebar-brand"><div class="brand-icon">🌐</div><h1>FTMS</h1><p>Foreign Trade System</p></div>
<nav class="sidebar-nav">
<a href="/dashboard">📊 <span class="nav-label">Dashboard</span></a>
<a href="/customers">👥 <span class="nav-label">Customers</span></a>
<a href="/orders">📦 <span class="nav-label">Orders</span></a>
<a href="/forex">💱 <span class="nav-label">Forex</span></a>
<a href="/invoices">🧾 <span class="nav-label">Invoices</span></a>
<a href="/products">🏭 <span class="nav-label">Products</span></a>
<a href="/countries">🌍 <span class="nav-label">Countries</span></a>
<a href="/banks">🏦 <span class="nav-label">Banks</span></a>
<a href="/currencies">💰 <span class="nav-label">Currencies</span></a>
<a href="/exchange-rates" class="active">📈 <span class="nav-label">Rates</span></a>
</nav>
<div class="sidebar-footer"><div>© 2025 FTMS v1.0</div><button class="btn btn-danger btn-sm" style="margin-top:8px;width:100%;justify-content:center;" onclick="handleLogout()">Logout</button></div>
</aside>
<main class="main-content">
<div class="page-header"><div><h2>Exchange Rates</h2><p>USD-centric rates management</p></div><button class="btn btn-primary" onclick="openModal()">➕ Add Rate</button></div>
<div class="card"><div class="table-wrap"><table><thead><tr><th>ID</th><th>From</th><th>To</th><th>Rate</th><th>Date</th></tr></thead><tbody id="ratesTable"></tbody></table></div></div>
</main>
</div>
<div class="modal-overlay" id="modal" style="display:none;">
<div class="modal"><h3>📈 Add Exchange Rate</h3>
<div class="form-grid">
<div class="form-group"><label>From Currency *</label><select id="mFrom"><option value="">Select</option></select></div>
<div class="form-group"><label>To Currency *</label><select id="mTo"><option value="">Select</option></select></div>
</div>
<div class="form-group"><label>Rate *</label><input type="number" id="mRate" step="0.000001" placeholder="83.500000"/></div>
<div class="form-group"><label>Date</label><input type="date" id="mDate"/></div>
<div class="form-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="addRate()">Add Rate</button></div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/exchange-rates.js"></script>
</body>
</html>
