<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Payments - Forex Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">✓</div>
                <span>Bank Portal</span>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item" data-link="bank_dashboard.html">
                    <div class="icon">🏠</div>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item active" data-link="verify_payments.html">
                    <div class="icon">✓</div>
                    <span>Verify</span>
                </div>
            </nav>
            <div class="sidebar-footer">
                <button class="sidebar-toggle">← Collapse</button>
            </div>
        </aside>

        <header class="topbar">
            <div class="topbar-left">
                <div class="search-bar">
                    <span class="icon">🔍</span>
                    <input type="text" placeholder="Search payments...">
                </div>
            </div>
            <div class="topbar-right">
                <div class="profile-dropdown">
                    <button class="profile-btn">
                        <div class="profile-avatar">B</div>
                        <span>Bank</span>
                    </button>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" onclick="logout()">🚪 Logout</div>
                    </div>
                </div>
            </div>
        </header>

        <main class="content">
            <div class="dashboard-title">
                Verify Payments
                <div class="subtitle">Verify and confirm customer payments</div>
            </div>

            <div style="background-color: var(--secondary-bg); border-radius: 8px; padding: 30px; border: 1px solid var(--tertiary-bg);">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Payment ID</th>
                                <th>Customer</th>
                                <th>Amount</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>PAY001</td>
                                <td>ABC Trading</td>
                                <td>$50,000</td>
                                <td>Feb 25, 2026</td>
                                <td><span style="color: #f0ad4e;">Pending</span></td>
                                <td><button class="btn" style="padding: 6px 12px; font-size: 12px;" onclick="verifyPayment(this)">Verify</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        function verifyPayment(btn) {
            showNotification('Payment verified successfully!', 'success');
            btn.parentElement.parentElement.cells[4].innerHTML = '<span style="color: #31a24c;">Verified</span>';
        }
    </script>
</body>
</html>
