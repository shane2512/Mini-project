<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History - Forex Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">📋</div>
                <span>Forex System</span>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-item" data-link="customer_dashboard.html">
                    <div class="icon">🏠</div>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item active" data-link="transaction_history.html">
                    <div class="icon">📋</div>
                    <span>History</span>
                </div>
                <div class="nav-item" data-link="transactions.html">
                    <div class="icon">💹</div>
                    <span>Transactions</span>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button class="sidebar-toggle">← Collapse</button>
            </div>
        </aside>

        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <div class="search-bar">
                    <span class="icon">🔍</span>
                    <input type="text" placeholder="Search history...">
                </div>
            </div>

            <div class="topbar-right">
                <div class="profile-dropdown">
                    <button class="profile-btn">
                        <div class="profile-avatar">C</div>
                        <span>Customer</span>
                    </button>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" onclick="logout()">
                            🚪 Logout
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="content">
            <div class="dashboard-title">
                Complete Transaction History
                <div class="subtitle">View all your historical transactions</div>
            </div>

            <div style="background-color: var(--secondary-bg); border-radius: 8px; padding: 30px; border: 1px solid var(--tertiary-bg);">
                <div class="table-container">
                    <table id="historyTable">
                        <thead>
                            <tr>
                                <th>Transaction ID</th>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Pair</th>
                                <th>Amount</th>
                                <th>Rate</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const transactions = MockAPI.getTransactions(20);
            const tableBody = document.getElementById('historyTableBody');

            transactions.forEach(txn => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${txn.id}</td>
                    <td>${formatDate(txn.date)}</td>
                    <td>${txn.type}</td>
                    <td>${txn.fromCurrency}/${txn.toCurrency}</td>
                    <td>$${txn.amount.toFixed(2)}</td>
                    <td>${txn.rate.toFixed(4)}</td>
                    <td><span style="color: ${getStatusColor(txn.status)}">${txn.status}</span></td>
                `;
                tableBody.appendChild(row);
            });
        });
    </script>
</body>
</html>
