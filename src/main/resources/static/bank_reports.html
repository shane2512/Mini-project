<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Reports - Forex Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">📈</div>
                <span>Bank Portal</span>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item" data-link="bank_dashboard.html">
                    <div class="icon">🏠</div>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item active" data-link="bank_reports.html">
                    <div class="icon">📈</div>
                    <span>Reports</span>
                </div>
            </nav>
            <div class="sidebar-footer">
                <button class="sidebar-toggle">← Collapse</button>
            </div>
        </aside>

        <header class="topbar">
            <div class="topbar-left">
                <div class="search-bar">
                    <span class="icon">🔍</span>
                    <input type="text" placeholder="Search...">
                </div>
            </div>
            <div class="topbar-right">
                <div class="profile-dropdown">
                    <button class="profile-btn">
                        <div class="profile-avatar">B</div>
                        <span>Bank</span>
                    </button>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" onclick="logout()">🚪 Logout</div>
                    </div>
                </div>
            </div>
        </header>

        <main class="content">
            <div class="dashboard-title">
                Bank-wise Reports
                <div class="subtitle">Generate comprehensive transaction reports</div>
            </div>

            <div class="cards-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); margin-bottom: 30px;">
                <div class="stat-box">
                    <div class="stat-title">Total Transactions</div>
                    <div class="stat-value">1,245</div>
                    <div class="stat-change" style="color: #31a24c;">This month</div>
                </div>
                <div class="stat-box">
                    <div class="stat-title">Total Volume</div>
                    <div class="stat-value">$25.5M</div>
                    <div class="stat-change" style="color: #31a24c;">+18%</div>
                </div>
            </div>

            <div style="background-color: var(--secondary-bg); border-radius: 8px; padding: 30px; border: 1px solid var(--tertiary-bg);">
                <h3 style="color: var(--primary-text); margin-bottom: 20px;">Recent Transaction Summary</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Transaction Count</th>
                                <th>Volume</th>
                                <th>Fees Collected</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Feb 25, 2026</td>
                                <td>45</td>
                                <td>$1.2M</td>
                                <td>$6,000</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
