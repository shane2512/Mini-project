<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Transactions - Forex Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">📊</div>
                <span>Bank Portal</span>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item" data-link="bank_dashboard.html">
                    <div class="icon">🏠</div>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item active" data-link="customer_transactions.html">
                    <div class="icon">📊</div>
                    <span>Transactions</span>
                </div>
            </nav>
            <div class="sidebar-footer">
                <button class="sidebar-toggle">← Collapse</button>
            </div>
        </aside>

        <header class="topbar">
            <div class="topbar-left">
                <div class="search-bar">
                    <span class="icon">🔍</span>
                    <input type="text" placeholder="Search customer transactions...">
                </div>
            </div>
            <div class="topbar-right">
                <div class="profile-dropdown">
                    <button class="profile-btn">
                        <div class="profile-avatar">B</div>
                        <span>Bank</span>
                    </button>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" onclick="logout()">🚪 Logout</div>
                    </div>
                </div>
            </div>
        </header>

        <main class="content">
            <div class="dashboard-title">
                Customer Transactions
                <div class="subtitle">View transactions of linked customers</div>
            </div>

            <div style="background-color: var(--secondary-bg); border-radius: 8px; padding: 30px; border: 1px solid var(--tertiary-bg);">
                <div class="table-container">
                    <table id="customerTransactionsTable">
                        <thead>
                            <tr>
                                <th>Transaction ID</th>
                                <th>Customer</th>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="txnBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const transactions = MockAPI.getTransactions(10);
            const tbody = document.getElementById('txnBody');
            transactions.forEach(txn => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${txn.id}</td>
                    <td>Customer ${Math.floor(Math.random() * 100)}</td>
                    <td>${formatDate(txn.date)}</td>
                    <td>${txn.type}</td>
                    <td>$${txn.amount.toFixed(2)}</td>
                    <td><span style="color: ${getStatusColor(txn.status)}">${txn.status}</span></td>
                `;
                tbody.appendChild(row);
            });
        });
    </script>
</body>
</html>
