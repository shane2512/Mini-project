<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWIFT/IFSC Data - Forex Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">🏷️</div>
                <span>Bank Portal</span>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item" data-link="bank_dashboard.html">
                    <div class="icon">🏠</div>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item active" data-link="swift_ifsc.html">
                    <div class="icon">🏷️</div>
                    <span>SWIFT/IFSC</span>
                </div>
            </nav>
            <div class="sidebar-footer">
                <button class="sidebar-toggle">← Collapse</button>
            </div>
        </aside>

        <header class="topbar">
            <div class="topbar-left">
                <div class="search-bar">
                    <span class="icon">🔍</span>
                    <input type="text" placeholder="Search codes...">
                </div>
            </div>
            <div class="topbar-right">
                <div class="profile-dropdown">
                    <button class="profile-btn">
                        <div class="profile-avatar">B</div>
                        <span>Bank</span>
                    </button>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" onclick="logout()">🚪 Logout</div>
                    </div>
                </div>
            </div>
        </header>

        <main class="content">
            <div class="dashboard-title">
                SWIFT/IFSC Data Management
                <div class="subtitle">Manage SWIFT and IFSC codes for bank operations</div>
            </div>

            <div class="section-card">
                <div class="section-header">
                    <h3>Bank Codes</h3>
                    <button class="btn btn-add">+ Add Code</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Bank Name</th>
                                <th>SWIFT Code</th>
                                <th>IFSC Code</th>
                                <th>Branch</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Chase Bank</td>
                                <td>CHASUS33</td>
                                <td>N/A</td>
                                <td>New York</td>
                            </tr>
                            <tr>
                                <td>HDFC Bank</td>
                                <td>HDFCINBB</td>
                                <td>HDFC0000001</td>
                                <td>Mumbai</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
