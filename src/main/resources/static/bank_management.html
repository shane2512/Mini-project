<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Management - Forex Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="logo-icon">🏦</div><span>Forex Admin</span></div>
            <nav class="sidebar-nav">
                <div class="nav-item" data-link="admin_dashboard.html"><div class="icon">🏠</div><span>Dashboard</span></div>
                <div class="nav-item active" data-link="bank_management.html"><div class="icon">🏦</div><span>Banks</span></div>
            </nav>
            <div class="sidebar-footer"><button class="sidebar-toggle">← Collapse</button></div>
        </aside>

        <header class="topbar">
            <div class="topbar-left">
                <div class="search-bar">
                    <span class="icon">🔍</span>
                    <input type="text" id="searchBanks" title="Search banks" placeholder="Search banks..." aria-label="Search banks">
                </div>
            </div>
            <div class="topbar-right">
                <div class="profile-dropdown">
                    <button class="profile-btn"><div class="profile-avatar">A</div><span>Admin</span></button>
                    <div class="dropdown-menu"><div class="dropdown-item" onclick="logout()">🚪 Logout</div></div>
                </div>
            </div>
        </header>

        <main class="content">
            <div class="dashboard-title">Bank Management<div class="subtitle">Manage bank details, SWIFT codes, and IFSC codes</div></div>

            <div class="section-card">
                <div class="section-header">
                    <h3>Registered Banks</h3>
                    <button class="btn btn-add">+ Add Bank</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Bank Name</th><th>Country</th><th>SWIFT Code</th><th>IFSC Code</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody>
                            <tr><td>Chase Bank</td><td>🇺🇸 USA</td><td>CHASUS33</td><td>N/A</td><td><span class="status-active">Active</span></td><td><button class="btn btn-sm btn-sm-gap">Edit</button><button class="btn btn-sm btn-danger">Delete</button></td></tr>
                            <tr><td>HDFC Bank</td><td>🇮🇳 India</td><td>HDFCINBB</td><td>HDFC0000001</td><td><span class="status-active">Active</span></td><td><button class="btn btn-sm btn-sm-gap">Edit</button><button class="btn btn-sm btn-danger">Delete</button></td></tr>
                            <tr><td>HSBC</td><td>🇬🇧 UK</td><td>HSBCGB2L</td><td>N/A</td><td><span class="status-active">Active</span></td><td><button class="btn btn-sm btn-sm-gap">Edit</button><button class="btn btn-sm btn-danger">Delete</button></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="form-container">
                <h3 class="form-heading">Add New Bank</h3>
                <form onsubmit="addBank(event)">
                    <div class="form-grid-2">
                        <div class="form-group">
                            <label for="bankName">Bank Name</label>
                            <input type="text" id="bankName" title="Enter bank name" placeholder="Enter bank name" required>
                        </div>
                        <div class="form-group">
                            <label for="bankCountry">Country</label>
                            <select id="bankCountry" title="Select country" required>
                                <option value="">Select country</option>
                                <option value="USA">United States</option>
                                <option value="UK">United Kingdom</option>
                                <option value="India">India</option>
                                <option value="Canada">Canada</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="bankSwift">SWIFT Code</label>
                            <input type="text" id="bankSwift" title="Enter SWIFT code" placeholder="e.g., CHASUS33" maxlength="11" required>
                        </div>
                        <div class="form-group">
                            <label for="bankIfsc">IFSC Code (optional)</label>
                            <input type="text" id="bankIfsc" title="Enter IFSC code (optional)" placeholder="e.g., HDFC0000001">
                        </div>
                        <div class="form-group">
                            <label for="bankAddress">Bank Address</label>
                            <input type="text" id="bankAddress" title="Enter full address" placeholder="Full address" required>
                        </div>
                        <div class="form-group">
                            <label for="bankPhone">Phone Number</label>
                            <input type="tel" id="bankPhone" title="Enter phone number" placeholder="+1-555-0000" required>
                        </div>
                    </div>
                    <button type="submit" class="btn form-submit">Add Bank</button>
                </form>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        function addBank(event) {
            event.preventDefault();
            showNotification('Bank added successfully!', 'success');
            event.target.reset();
        }
    </script>
</body>
</html>
