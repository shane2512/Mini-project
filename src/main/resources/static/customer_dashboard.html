<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer-Bank Linkage - Forex Management System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .section-card {
            background-color: var(--secondary-bg);
            border-radius: 8px;
            padding: 30px;
            border: 1px solid var(--tertiary-bg);
            margin-bottom: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h3 {
            color: var(--primary-text);
        }

        .btn-add {
            padding: 10px 20px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .status-verified {
            color: #31a24c;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">🔗</div>
                <span>Bank Portal</span>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item" data-link="bank_dashboard.html">
                    <div class="icon">🏠</div>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item active" data-link="customer_linkage.html">
                    <div class="icon">🔗</div>
                    <span>Linkage</span>
                </div>
            </nav>
            <div class="sidebar-footer">
                <button class="sidebar-toggle">← Collapse</button>
            </div>
        </aside>

        <header class="topbar">
            <div class="topbar-left">
                <div class="search-bar">
                    <span class="icon">🔍</span>
                    <input type="text" placeholder="Search customers...">
                </div>
            </div>
            <div class="topbar-right">
                <div class="profile-dropdown">
                    <button class="profile-btn">
                        <div class="profile-avatar">B</div>
                        <span>Bank</span>
                    </button>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" onclick="logout()">🚪 Logout</div>
                    </div>
                </div>
            </div>
        </header>

        <main class="content">
            <div class="dashboard-title">
                Customer-Bank Linkage
                <div class="subtitle">Manage bank-customer relationships</div>
            </div>

            <div class="section-card">
                <div class="section-header">
                    <h3>Linked Customers</h3>
                    <button class="btn btn-add">+ Link Customer</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Customer ID</th>
                                <th>Customer Name</th>
                                <th>Business Type</th>
                                <th>Status</th>
                                <th>Linked Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>CUST001</td>
                                <td>ABC Trading Co.</td>
                                <td>Import/Export</td>
                                <td><span class="status-verified">Verified</span></td>
                                <td>Jan 15, 2026</td>
                                <td><button class="btn btn-sm">Manage</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
