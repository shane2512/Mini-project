<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Forex Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">💼</div>
                <span>Forex Trade</span>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-item active" data-link="customer_dashboard.html">
                    <div class="icon">🏠</div>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item" data-link="orders.html">
                    <div class="icon">📦</div>
                    <span>Orders</span>
                </div>
                <div class="nav-item" data-link="transactions.html">
                    <div class="icon">💱</div>
                    <span>Transactions</span>
                </div>
                <div class="nav-item" data-link="transaction_history.html">
                    <div class="icon">📋</div>
                    <span>History</span>
                </div>
                <div class="nav-item" data-link="invoices.html">
                    <div class="icon">🧾</div>
                    <span>Invoices</span>
                </div>
                <div class="nav-item" data-link="exchange_rates_view.html">
                    <div class="icon">📈</div>
                    <span>Rates</span>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button class="sidebar-toggle">← Collapse</button>
            </div>
        </aside>

        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <div class="search-bar">
                    <span class="icon">🔍</span>
                    <input type="text" placeholder="Search cards...">
                </div>
            </div>

            <div class="topbar-right">
                <div class="notification-icon">
                    🔔
                    <span class="notification-badge">2</span>
                </div>

                <div class="profile-dropdown">
                    <button class="profile-btn">
                        <div class="profile-avatar">C</div>
                        <span>Customer</span>
                    </button>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" onclick="window.location.href='profile_kyc.html'">
                            👤 Profile
                        </div>
                        <div class="dropdown-item" onclick="window.location.href='settings.html'">
                            ⚙️ Settings
                        </div>
                        <div class="dropdown-item">
                            ❓ Help
                        </div>
                        <div class="dropdown-item" onclick="logout()">
                            🚪 Logout
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="content">
            <div class="dashboard-title">
                Welcome to Your Dashboard
                <div class="subtitle">Manage your forex trades and orders</div>
            </div>

            <div class="cards-grid" id="cardsGrid">
                <!-- Cards will be generated here by JavaScript -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        // Override currentUser for customer
        currentUser.role = 'customer';
        currentUser.name = 'Customer User';
    </script>
</body>
</html>
