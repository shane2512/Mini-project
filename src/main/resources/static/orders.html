<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Forex Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">📦</div>
                <span>Forex System</span>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item" data-link="customer_dashboard.html"><div class="icon">🏠</div><span>Dashboard</span></div>
                <div class="nav-item active" data-link="orders.html"><div class="icon">📦</div><span>Orders</span></div>
                <div class="nav-item" data-link="transactions.html"><div class="icon">💹</div><span>Transactions</span></div>
                <div class="nav-item" data-link="invoices.html"><div class="icon">🧾</div><span>Invoices</span></div>
            </nav>
            <div class="sidebar-footer"><button class="sidebar-toggle">← Collapse</button></div>
        </aside>

        <header class="topbar">
            <div class="topbar-left">
                <div class="search-bar">
                    <span class="icon">🔍</span>
                    <input type="text" id="searchOrders" title="Search orders" placeholder="Search orders..." aria-label="Search orders">
                </div>
            </div>
            <div class="topbar-right">
                <div class="notification-icon">🔔<span class="notification-badge">2</span></div>
                <div class="profile-dropdown">
                    <button class="profile-btn"><div class="profile-avatar">C</div><span>Customer</span></button>
                    <div class="dropdown-menu"><div class="dropdown-item" onclick="logout()">🚪 Logout</div></div>
                </div>
            </div>
        </header>

        <main class="content">
            <div class="dashboard-title">Import/Export Orders<div class="subtitle">Manage your import and export orders</div></div>

            <div class="filter-bar">
                <div class="filter-grid">
                    <div>
                        <label for="filterOrderType">Order Type</label>
                        <select id="filterOrderType" title="Filter by order type">
                            <option>All</option><option>Import</option><option>Export</option>
                        </select>
                    </div>
                    <div>
                        <label for="filterOrderStatus">Status</label>
                        <select id="filterOrderStatus" title="Filter by status">
                            <option>All</option><option>Processing</option><option>Shipped</option><option>Delivered</option>
                        </select>
                    </div>
                    <div class="flex-end"><button class="btn w-full">Apply Filters</button></div>
                </div>
            </div>

            <div class="stats-row">
                <div class="stat-box"><div class="stat-title">Active Orders</div><div class="stat-value">12</div><div class="stat-change">In progress</div></div>
                <div class="stat-box"><div class="stat-title">Completed</div><div class="stat-value">156</div><div class="stat-change text-success">+8 this month</div></div>
                <div class="stat-box"><div class="stat-title">Total Value</div><div class="stat-value">$1.2M</div><div class="stat-change text-success">+15%</div></div>
            </div>

            <div class="section-card">
                <div class="section-header">
                    <h3>Your Orders</h3>
                    <button class="btn btn-export" onclick="exportToCSV(MockAPI.getOrders(),'orders.csv')">📥 Export CSV</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Order ID</th><th>Date</th><th>Type</th><th>Product</th><th>Quantity</th><th>Value</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody id="ordersTable"></tbody>
                    </table>
                </div>
            </div>

            <div class="form-container">
                <h3 class="form-heading">Place New Order</h3>
                <form onsubmit="placeOrder(event)">
                    <div class="form-grid-2">
                        <div class="form-group">
                            <label for="orderType">Order Type</label>
                            <select id="orderType" title="Select order type" required>
                                <option value="">Select type</option><option value="import">Import</option><option value="export">Export</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="orderProduct">Product</label>
                            <select id="orderProduct" title="Select product" required>
                                <option value="">Select product</option><option value="electronics">Electronics</option>
                                <option value="clothing">Clothing</option><option value="machinery">Machinery</option><option value="chemicals">Chemicals</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="orderQty">Quantity</label>
                            <input type="number" id="orderQty" title="Enter quantity" placeholder="1000" required>
                        </div>
                        <div class="form-group">
                            <label for="orderPrice">Unit Price</label>
                            <input type="number" id="orderPrice" step="0.01" title="Enter unit price" placeholder="1000.00" required>
                        </div>
                        <div class="form-group">
                            <label for="orderCurrency">Currency</label>
                            <select id="orderCurrency" title="Select currency" required>
                                <option value="USD">USD</option><option value="EUR">EUR</option><option value="GBP">GBP</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="orderDelivery">Expected Delivery Date</label>
                            <input type="date" id="orderDelivery" title="Select expected delivery date" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="orderNotes">Special Requirements</label>
                        <textarea id="orderNotes" title="Special requirements or notes" placeholder="Any special requirements or notes..."></textarea>
                    </div>
                    <button type="submit" class="btn mt-15">Place Order</button>
                </form>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const orders = MockAPI.getOrders(10);
            const tableBody = document.getElementById('ordersTable');
            orders.forEach(function (order) {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${order.id}</td><td>${formatDate(order.date)}</td><td>${order.type}</td><td>${order.product}</td>
                    <td>${order.quantity}</td><td>$${order.value.toFixed(2)} ${order.currency}</td>
                    <td><span style="color:${getStatusColor(order.status)}">${order.status}</span></td>
                    <td><button class="btn btn-sm">View</button></td>`;
                tableBody.appendChild(row);
            });
        });
        function placeOrder(event) {
            event.preventDefault();
            showNotification('Order placed successfully!', 'success');
            event.target.reset();
        }
    </script>
</body>
</html>
