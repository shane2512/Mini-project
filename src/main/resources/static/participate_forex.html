<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participate in Forex - Forex Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">💱</div>
                <span>Bank Portal</span>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item" data-link="bank_dashboard.html"><div class="icon">🏠</div><span>Dashboard</span></div>
                <div class="nav-item active" data-link="participate_forex.html"><div class="icon">💱</div><span>Participate</span></div>
            </nav>
            <div class="sidebar-footer"><button class="sidebar-toggle">← Collapse</button></div>
        </aside>

        <header class="topbar">
            <div class="topbar-left">
                <div class="search-bar">
                    <span class="icon">🔍</span>
                    <input type="text" id="searchParticipate" title="Search" placeholder="Search..." aria-label="Search">
                </div>
            </div>
            <div class="topbar-right">
                <div class="profile-dropdown">
                    <button class="profile-btn"><div class="profile-avatar">B</div><span>Bank</span></button>
                    <div class="dropdown-menu"><div class="dropdown-item" onclick="logout()">🚪 Logout</div></div>
                </div>
            </div>
        </header>

        <main class="content">
            <div class="dashboard-title">
                Participate in Forex Transactions
                <div class="subtitle">Join forex transactions as an intermediary</div>
            </div>

            <div class="form-container">
                <h3 class="form-heading">Participate in Transaction</h3>
                <form onsubmit="participateForex(event)">
                    <div class="form-grid-2">
                        <div class="form-group">
                            <label for="pfCustomer">Customer</label>
                            <select id="pfCustomer" title="Select customer" required>
                                <option value="">Select customer</option>
                                <option value="CUST001">ABC Trading Co.</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="pfPair">Currency Pair</label>
                            <select id="pfPair" title="Select currency pair" required>
                                <option value="USD/EUR">USD/EUR</option>
                                <option value="USD/GBP">USD/GBP</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="pfAmount">Amount</label>
                            <input type="number" id="pfAmount" step="0.01" title="Enter amount" placeholder="0.00" required>
                        </div>
                        <div class="form-group">
                            <label for="pfRate">Rate</label>
                            <input type="number" id="pfRate" step="0.0001" title="Enter exchange rate" placeholder="0.0000" required>
                        </div>
                    </div>
                    <button type="submit" class="btn mt-15">Participate</button>
                </form>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        function participateForex(event) {
            event.preventDefault();
            showNotification('Successfully participated in transaction!', 'success');
            event.target.reset();
        }
    </script>
</body>
</html>
