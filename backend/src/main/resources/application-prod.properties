server.address=0.0.0.0
server.port=${SERVER_PORT:8080}

# ===== PRODUCTION: PostgreSQL on Supabase =====
# Use environment variables for credentials
# Set on Render dashboard or in .env file

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Disable H2 Console in production
spring.h2.console.enabled=false

# JWT
jwt.secret=${JWT_SECRET}

# CORS - Production URLs only
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://ftms-frontend.netlify.app,https://ftms-backend.onrender.com}

# Forex API
forex.api.url=${FOREX_API_URL:https://api.exchangerate-api.com/v4/latest/USD}

# Application
spring.application.name=ftms-backend
spring.profiles.active=prod
