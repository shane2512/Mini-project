server.address=0.0.0.0
server.port=${SERVER_PORT:8080}

# PostgreSQL Database for Production
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (disabled in production)
spring.h2.console.enabled=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS - Include Netlify deployment URL and any allowed origins
cors.allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000,https://ftms-frontend.netlify.app}

# Forex API
forex.api.url=${FOREX_API_URL:https://api.exchangerate-api.com/v4/latest/USD}

# Application
spring.application.name=ftms-backend