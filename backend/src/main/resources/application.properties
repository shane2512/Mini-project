server.address=0.0.0.0
server.port=${SERVER_PORT:8080}

# ===== LOCAL DEVELOPMENT: H2 File-Based Database =====
# This is the DEFAULT configuration for local development
# Data persists in ftms_db.mv.db file

spring.datasource.url=jdbc:h2:file:./ftms_db;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate (use update to preserve data on restart)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false

# H2 Console - Enable for local debugging (http://localhost:8080/h2-console)
# USERNAME: sa
# PASSWORD: (leave empty)
# JDBC URL: jdbc:h2:file:./ftms_db
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=${JWT_SECRET:ftms_jwt_secret_key_2024_change_in_production}
jwt.expiration=86400000

# CORS - Allow production URLs
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,https://ftms-frontend.netlify.app}

# Forex API
forex.api.url=${FOREX_API_URL:https://api.exchangerate-api.com/v4/latest/USD}

# Application
spring.application.name=ftms-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}