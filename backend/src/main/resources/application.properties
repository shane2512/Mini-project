server.port=8080

# ☁️ AIVEN CLOUD DATABASE
spring.datasource.url=jdbc:mysql://mysql-1f074a17-ooseproject123.a.aivencloud.com:17457/ftms_db?useSSL=true&serverTimezone=UTC
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:ftms_jwt_secret_key_2024_very_long_string_change_this_before_production}
jwt.expiration=86400000

# CORS
cors.allowed.origins=http://localhost:5500,http://127.0.0.1:5500,http://192.168.1.6:5500,http://localhost:63023,http://127.0.0.1:63023,null,https://*.netlify.app,http://localhost:8080,http://localhost:3000

# Forex API
forex.api.url=https://api.exchangerate-api.com/v4/latest/USD

# Application
spring.application.name=ftms-backend