server.address=0.0.0.0
server.port=8080

# H2 Database for development/testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=${JWT_SECRET:ftms_jwt_secret_key_2024_very_long_string_change_this_before_production}
jwt.expiration=86400000

# CORS
cors.allowed.origins=http://localhost:5500,http://127.0.0.1:5500,http://192.168.1.6:5500,http://localhost:63023,http://127.0.0.1:63023,null,https://*.netlify.app,https://ftms-frontend.netlify.app,http://172.16.24.81:5500

# Forex API
forex.api.url=https://api.exchangerate-api.com/v4/latest/USD

# Application
spring.application.name=ftms-backend