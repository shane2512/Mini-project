server.port=8080

# Supabase PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.YOUR_PROJECT_REF.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:change_me}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:ftms_jwt_secret_key_2024_very_long_string_change_this_before_production}
jwt.expiration=86400000

# CORS
cors.allowed.origins=http://localhost:5500,http://127.0.0.1:5500,http://192.168.1.6:5500,http://localhost:63023,http://127.0.0.1:63023,null,https://*.netlify.app,https://ftms-frontend.netlify.app

# Forex API
forex.api.url=https://api.exchangerate-api.com/v4/latest/USD

# Application
spring.application.name=ftms-backend