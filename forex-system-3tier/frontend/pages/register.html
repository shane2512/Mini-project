<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FTMS � Register</title>
    <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="login-page">
    <div class="login-box" style="width:520px;">
        <div class="brand-icon" style="width:48px;height:48px;background:linear-gradient(135deg,#00d4aa,#3b82f6);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px;">??</div>
        <h2 style="text-align:center;">Create Account</h2>
        <p style="text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:28px;">Register as a trader</p>
        <div class="form-grid">
            <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="John Doe"/></div>
            <div class="form-group"><label>Phone</label><input type="text" id="phone" placeholder="+91 9876543210"/></div>
        </div>
        <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="john@email.com"/></div>
        <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Min 6 characters"/></div>
        <div class="form-grid">
            <div class="form-group"><label>Customer Type</label><select id="customerType"><option value="IMPORTER">Importer</option><option value="EXPORTER">Exporter</option><option value="FOREX_TRADER">Forex Trader</option></select></div>
            <div class="form-group"><label>Bank</label><select id="bankId"><option value="">Loading...</option></select></div>
        </div>
        <div class="form-group"><label>Address</label><input type="text" id="address" placeholder="Full address"/></div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" onclick="handleRegister()">Create Account</button>
        <div class="divider">or</div>
        <button class="btn btn-secondary" style="width:100%;justify-content:center;" onclick="window.location.href='../pages/login.html'">Back to Login</button>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
