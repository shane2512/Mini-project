<body>
<div class="app-layout">
<aside class="sidebar">
<div class="sidebar-brand"><div class="brand-icon">??</div><h1>FTMS</h1><p>Foreign Trade System</p></div>
<nav class="sidebar-nav">

</aside>
<main class="main-content">
<div class="page-header"><div><h2>Forex Transactions</h2><p>USD-centric currency conversion</p></div><button class="btn btn-primary" onclick="openModal()">? New Transaction</button></div>
<div class="card"><div class="table-wrap"><table><thead><tr><th>ID</th><th>Customer</th><th>From</th><th>To</th><th>Amount</th><th>Converted</th><th>Rate</th><th>Date</th></tr></thead><tbody id="forexTable"><tr><td colspan="8"><div class="loading"><div class="spinner"></div></div></td></tr></tbody></table></div></div>
</main>
</div>
<div class="modal-overlay" id="modal" style="display:none;">
<div class="modal"><h3>?? New Forex Transaction</h3>
<div class="form-group"><label>Customer *</label><select id="mCustomer"><option value="">Select customer</option></select></div>
<div class="form-grid">
<div class="form-group"><label>From Currency</label><select id="mFrom" onchange="calculatePreview()"></select></div>
<div class="form-group"><label>To Currency</label><select id="mTo" onchange="calculatePreview()"></select></div>
</div>
<div class="form-group"><label>Amount *</label><input type="number" id="mAmount" placeholder="50000" oninput="calculatePreview()"/></div>
<div class="rate-box" id="convPreview" style="display:none;"><div style="font-size:12px;color:var(--text-muted);margin-bottom:6px;" id="convPath"></div><div class="rate-num" id="convAmount"></div><div class="rate-label" id="convRate"></div></div>
<div class="form-grid">
<div class="form-group"><label>Customer Bank</label><select id="mBank"><option value="">Select bank</option></select></div>
<div class="form-group"><label>Central Bank (From)</label><select id="mCentralBank"><option value="">Select central bank</option></select></div>
</div>
<div class="form-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="executeForex()">Execute Transaction</button></div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app-config.js"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/forex.js"></script>
</body>
</html>
