<main class="main-content">
<div class="page-header"><div><h2>Orders</h2><p id="subTitle">Loading...</p></div><button class="btn btn-primary" onclick="openModal()">? Place Order</button></div>
<div class="card"><div class="table-wrap"><table><thead><tr><th>ID</th><th>Customer</th><th>Product</th><th>Type</th><th>Qty</th><th>Total</th><th>Currency</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody id="ordersTable"><tr><td colspan="10"><div class="loading"><div class="spinner"></div></div></td></tr></tbody></table></div></div>
</main>
</div>
<div class="modal-overlay" id="modal" style="display:none;">
<div class="modal"><h3>?? Place New Order</h3>
<div class="form-group"><label>Customer *</label><select id="mCustomer"><option value="">Select customer</option></select></div>
<div class="form-grid">
<div class="form-group"><label>Product *</label><select id="mProduct" onchange="updateTotal()"><option value="">Select product</option></select></div>
<div class="form-group"><label>Order Type</label><select id="mOrderType"><option value="IMPORT">Import</option><option value="EXPORT">Export</option></select></div>
<div class="form-group"><label>Quantity *</label><input type="number" id="mQty" min="1" placeholder="100" oninput="updateTotal()"/></div>
<div class="form-group"><label>Currency</label><select id="mCurrency"></select></div>
</div>
<div class="rate-box" id="totalPreview" style="display:none;"><div class="rate-num" id="totalAmount">0</div><div class="rate-label">Estimated Total</div></div>
<div class="form-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="placeOrder()">Place Order</button></div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
