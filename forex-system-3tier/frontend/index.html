<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FTMS Landing</title>
    <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
    <div class="login-page">
        <div class="login-box" style="text-align:center;">
            <h2>Foreign Trade Management System</h2>
            <p>Welcome to FTMS</p>
            <button id="entryButton" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
                Continue
            </button>
        </div>
    </div>
    <noscript>JavaScript is required to continue.</noscript>
    <script src="./js/app-config.js"></script>
    <script src="./js/supabase-config.js"></script>
    <script>
        (function () {
            const sessionKey = 'ftms_session';
            let hasSession = false;
            try {
                const raw = localStorage.getItem(sessionKey);
                hasSession = !!raw;
            } catch (_) {
                hasSession = false;
            }

            const button = document.getElementById('entryButton');
            if (hasSession) {
                button.textContent = 'Go to Dashboard';
                button.onclick = function () { window.location.href = '/pages/index.html'; };
            } else {
                button.textContent = 'Login';
                button.onclick = function () { window.location.href = '/pages/login.html'; };
            }
        })();
    </script>
</body>
</html>
