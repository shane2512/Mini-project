<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTMS - Foreign Trade Management System</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0c10;
            color: #e8eaf0;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ═══════════ ANIMATED BACKGROUND ═══════════ */
        .landing-bg {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0a0c10 0%, #0f1419 25%, #1a1f2e 50%, #0d2040 75%, #0a0c10 100%);
            overflow: hidden;
            z-index: 1;
        }

        /* Animated gradient overlay */
        .bg-gradient {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(0, 212, 170, 0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 70%, rgba(0, 153, 255, 0.06) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 212, 170, 0.03) 0%, transparent 50%);
            animation: gradientShift 8s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% {
                background: 
                    radial-gradient(ellipse at 20% 30%, rgba(0, 212, 170, 0.08) 0%, transparent 40%),
                    radial-gradient(ellipse at 80% 70%, rgba(0, 153, 255, 0.06) 0%, transparent 40%),
                    radial-gradient(ellipse at 50% 50%, rgba(0, 212, 170, 0.03) 0%, transparent 50%);
            }
            50% {
                background: 
                    radial-gradient(ellipse at 30% 40%, rgba(0, 212, 170, 0.1) 0%, transparent 45%),
                    radial-gradient(ellipse at 70% 60%, rgba(0, 153, 255, 0.08) 0%, transparent 45%),
                    radial-gradient(ellipse at 45% 55%, rgba(0, 212, 170, 0.05) 0%, transparent 55%);
            }
        }

        /* Grid pattern */
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* Floating particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 212, 170, 0.3) 0%, transparent 70%);
            pointer-events: none;
        }

        .particle-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
            animation: float1 15s ease-in-out infinite;
        }

        .particle-2 {
            width: 200px;
            height: 200px;
            top: 50%;
            right: -50px;
            animation: float2 18s ease-in-out infinite;
        }

        .particle-3 {
            width: 250px;
            height: 250px;
            bottom: -80px;
            left: 30%;
            animation: float3 20s ease-in-out infinite;
            background: radial-gradient(circle, rgba(0, 153, 255, 0.2) 0%, transparent 70%);
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 30px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-40px, 40px); }
        }

        @keyframes float3 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -50px); }
        }

        /* Glow effect */
        .glow-elements {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .glow-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 170, 0.2), transparent);
            animation: glowPulse 3s ease-in-out infinite;
        }

        .glow-line-1 {
            width: 100%;
            height: 1px;
            top: 25%;
            animation-delay: 0s;
        }

        .glow-line-2 {
            width: 100%;
            height: 1px;
            top: 75%;
            animation-delay: 1s;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* ═══════════ LANDING CONTENT ═══════════ */
        .landing {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .landing-content {
            max-width: 700px;
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .landing h1 {
            font-size: clamp(48px, 8vw, 72px);
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #00d4aa 0%, #00f0c0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .landing > div > p:first-of-type {
            font-size: clamp(18px, 5vw, 24px);
            color: #e8eaf0;
            margin-bottom: 12px;
            font-weight: 500;
            animation: fadeIn 1s ease-out 0.2s both;
        }

        .landing > div > p:last-of-type {
            font-size: 15px;
            color: #8a90a0;
            margin-bottom: 40px;
            opacity: 0.85;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .landing-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .btn-landing {
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            border: none;
            font-family: inherit;
            min-width: 160px;
        }

        .btn-landing::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.1), transparent 70%);
            transform: translateX(-100%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .btn-login {
            background: linear-gradient(135deg, #00d4aa 0%, #00a88a 100%);
            color: #0a0c10;
            box-shadow: 0 8px 24px rgba(0, 212, 170, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0, 212, 170, 0.4);
            background: linear-gradient(135deg, #00f0c0 0%, #00d4aa 100%);
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        .btn-register {
            background: transparent;
            color: #e8eaf0;
            border: 2px solid rgba(0, 212, 170, 0.5);
        }

        .btn-register:hover {
            transform: translateY(-3px);
            border-color: #00d4aa;
            background: rgba(0, 212, 170, 0.1);
            box-shadow: 0 8px 24px rgba(0, 212, 170, 0.2);
            color: #00f0c0;
        }

        .btn-register:active {
            transform: translateY(-1px);
        }

        /* Badge */
        .badge-new {
            display: inline-block;
            background: rgba(0, 212, 170, 0.15);
            color: #00d4aa;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 212, 170, 0.3);
            animation: fadeIn 1s ease-out both;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .landing h1 { font-size: 40px; }
            .landing > div > p:first-of-type { font-size: 18px; }
            .landing > div > p:last-of-type { font-size: 13px; }
            .landing-buttons { gap: 12px; }
            .btn-landing { padding: 12px 32px; font-size: 14px; min-width: 140px; }
            .particle-1, .particle-2, .particle-3 { opacity: 0.5; }
        }

        @media (max-width: 480px) {
            .landing { padding: 20px; }
            .landing h1 { font-size: 32px; }
            .landing > div > p:first-of-type { font-size: 16px; margin-bottom: 8px; }
            .landing > div > p:last-of-type { font-size: 12px; margin-bottom: 24px; }
            .landing-buttons { flex-direction: column; gap: 12px; }
            .btn-landing { width: 100%; padding: 12px 24px; font-size: 14px; }
            .bg-grid { background-size: 40px 40px; }
            .particle-1 { width: 200px; height: 200px; }
            .particle-2 { width: 150px; height: 150px; }
            .particle-3 { width: 180px; height: 180px; }
        }
    </style>
</head>
<body>
    <div class="landing-bg">
        <div class="bg-gradient"></div>
        <div class="bg-grid"></div>
        <div class="particle particle-1"></div>
        <div class="particle particle-2"></div>
        <div class="particle particle-3"></div>
        <div class="glow-elements">
            <div class="glow-line glow-line-1"></div>
            <div class="glow-line glow-line-2"></div>
        </div>
    </div>

    <div class="landing">
        <div class="landing-content">
            <div class="badge-new">✨ Welcome to FTMS</div>
            <h1>FTMS</h1>
            <p>Foreign Trade Management System</p>
            <p>Streamlined forex transactions with secure KYC verification and real-time exchange rates</p>
            <div class="landing-buttons">
                <a href="/login.html" class="btn-landing btn-login">Login</a>
                <a href="/register.html" class="btn-landing btn-register">Register</a>
            </div>
        </div>
    </div>
</body>
</html>
