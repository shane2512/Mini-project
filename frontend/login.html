<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTMS — Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-left">
      <div class="auth-left-grid"></div>
      <div class="auth-left-content">
        <div class="auth-brand">FT<span>MS</span></div>
        <p class="auth-tagline">Forex Transaction Management System</p>
        <div class="auth-stat">
          <div class="auth-stat-value" id="live-usd-inr">loading...</div>
          <div class="auth-stat-label">USD / INR — Live Rate</div>
        </div>
        <div class="auth-stat">
          <div class="auth-stat-value" id="live-usd-eur">loading...</div>
          <div class="auth-stat-label">USD / EUR — Live Rate</div>
        </div>
        <div class="auth-stat">
          <div class="auth-stat-value" id="live-usd-gbp">loading...</div>
          <div class="auth-stat-label">USD / GBP — Live Rate</div>
        </div>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to your FTMS account</p>

        <div id="error-msg" class="error-message" style="display:none;"></div>

        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')handleLogin()" />
        </div>

        <button class="btn-primary" onclick="handleLogin()" id="login-btn">Sign in</button>

        <p class="link-text">Don't have an account? <a href="register.html">Register</a></p>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (Auth.isLoggedIn()) redirectByRole(Auth.getRole());

    // Check if session expired
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('reason') === 'session_expired') {
      const errEl = document.getElementById('error-msg');
      errEl.innerHTML = '⏱️ <strong>Session Expired</strong><br>Your session has expired. Please login again.';
      errEl.style.display = 'block';
    }

    // Load live rates on login page
    fetch('https://api.exchangerate-api.com/v4/latest/USD')
      .then(r => r.json())
      .then(data => {
        document.getElementById('live-usd-inr').textContent = data.rates.INR.toFixed(2);
        document.getElementById('live-usd-eur').textContent = data.rates.EUR.toFixed(4);
        document.getElementById('live-usd-gbp').textContent = data.rates.GBP.toFixed(4);
      }).catch(() => {
        document.getElementById('live-usd-inr').textContent = '—';
        document.getElementById('live-usd-eur').textContent = '—';
        document.getElementById('live-usd-gbp').textContent = '—';
      });

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errEl = document.getElementById('error-msg');
      const btn = document.getElementById('login-btn');

      if (!email || !password) {
        errEl.textContent = 'Please enter your email and password.';
        errEl.style.display = 'block'; return;
      }

      console.log('🔐 Login attempt with:', {
        email: email,
        emailLength: email.length,
        emailCharCodes: Array.from(email).map(c => c.charCodeAt(0)),
        password: '***hidden***'
      });

      btn.textContent = 'Signing in...';
      btn.disabled = true;

      try {
        const res = await fetch(CONFIG.API_BASE_URL + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        console.log('🔑 Login response:', data, 'Status:', res.status);

        // Handle account/session approval errors specifically (403 Forbidden)
        if (res.status === 403) {
          errEl.style.display = 'block';
          // Account status message from backend
          if (data.message.includes('pending admin approval')) {
            errEl.innerHTML = '⏳ <strong>Account Pending Approval</strong><br>' + data.message;
          } else if (data.message.includes('rejected')) {
            errEl.innerHTML = '❌ <strong>Account Rejected</strong><br>' + data.message;
          } else {
            errEl.textContent = data.message;
          }
          btn.textContent = 'Sign in';
          btn.disabled = false;
          return;
        }

        if (data.token) {
          Auth.saveSession(data.token, data.role, data.fullName, data.userId);
          
          // Save additional data in localStorage for use on dashboard
          localStorage.setItem('kycStatus', data.kycStatus || 'PENDING');
          localStorage.setItem('accountStatus', data.accountStatus || 'PENDING');
          
          // Auto-redirect based on role
          console.log('✅ Login successful - Redirecting to role-specific dashboard: ' + data.role);
          setTimeout(() => {
            redirectByRole(data.role);
          }, 500); // Small delay ensures localStorage is fully written
        } else {
          errEl.textContent = data.message || 'Invalid credentials.';
          errEl.style.display = 'block';
        }
      } catch (e) {
        errEl.textContent = 'Cannot connect to server. Make sure backend is running.';
        errEl.style.display = 'block';
      } finally {
        btn.textContent = 'Sign in';
        btn.disabled = false;
      }
    }

    function redirectByRole(role) {
      const map = {
        ADMIN: 'admin/dashboard.html',
        CENTRAL_BANK: 'central-bank/dashboard.html',
        COMMERCIAL_BANK: 'bank/dashboard.html',
        IMPORTER: 'user/importer-dashboard.html',
        EXPORTER: 'user/exporter-dashboard.html',
        EXCHANGER: 'user/exchanger-dashboard.html'
      };
      window.location.href = map[role] || 'user/dashboard.html';
    }
  </script>
</body>
</html>
