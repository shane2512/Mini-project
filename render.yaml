services:
  - type: web
    name: ftms-backend
    env: java
    region: oregon
    plan: free
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: java -Dspring.profiles.active=prod -jar backend/target/ftms-backend.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        scope: build,runtime
        value: jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        scope: build,runtime
      - key: SPRING_DATASOURCE_PASSWORD
        scope: build,runtime
      - key: SPRING_DATASOURCE_DRIVER
        scope: build,runtime
        value: org.postgresql.Driver
      - key: HIBERNATE_DIALECT
        scope: build,runtime
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: JWT_SECRET
        scope: build,runtime
      - key: CORS_ALLOWED_ORIGINS
        scope: build,runtime
        value: "https://ftms-new.netlify.app,https://mini-project-059o.onrender.com"
      - key: FOREX_API_URL
        scope: build,runtime
        value: https://api.exchangerate-api.com/v4/latest/USD
      - key: SERVER_PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: prod
    autoDeploy: true
